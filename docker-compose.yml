services:
  app:
    image: sherstnew/rzd-viewer:latest
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
    ports:
      - "3000:3000"
    volumes:
      - "./public/assets/station-photos:/app/public/assets/station-photos:ro"
    restart: unless-stopped
